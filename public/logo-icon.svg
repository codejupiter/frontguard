<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Outer shield -->
  <path d="M32 7 L53 15.5 L53 34 C53 47 43 55.5 32 60 C21 55.5 11 47 11 34 L11 15.5 Z"
        fill="url(#innerGlow)" stroke="url(#shield)" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Inner accent line -->
  <path d="M32 12 L49 19.5 L49 34 C49 44 41 51 32 55 C23 51 15 44 15 34 L15 19.5 Z"
        fill="none" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.2" stroke-linejoin="round"/>

  <!-- F character -->
  <text x="32" y="44"
        text-anchor="middle"
        font-family="'Courier New', monospace"
        font-weight="700"
        font-size="22"
        fill="#10b981">F</text>

  <!-- Horizontal scan lines -->
  <line x1="19" y1="24" x2="45" y2="24" stroke="#10b981" stroke-width="0.6" stroke-opacity="0.35"/>
  <line x1="22" y1="27" x2="42" y2="27" stroke="#10b981" stroke-width="0.4" stroke-opacity="0.15"/>
</svg>
